# ── Illustrated Vault — Gate 2 Deploy Workflow ────────────────────────────────
#
# STATUS: NOT APPROVED FOR PRODUCTION USE
#
# This workflow is manual-only (workflow_dispatch) during the Gate 2 migration.
# It will NOT fire automatically on push or PR.
#
# Production deployment is blocked until:
#   1. The migrated Vite app passes the full Gate 2 regression checklist.
#   2. `public/CNAME` is added (it is intentionally absent until the production
#      switch phase — adding it before parity is reached would point the live
#      custom domain to an incomplete build).
#   3. The trigger is manually changed from workflow_dispatch to on-push.
#
# Do not trigger this workflow until the regression checklist in the Gate 2 plan
# is fully checked off.
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy Gate 2 (manual only)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: >
          Type DEPLOY to confirm. Production deployment is not approved until
          the Gate 2 regression checklist is complete and public/CNAME has been
          added to the branch.
        required: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Verify confirmation input
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DEPLOY" ]; then
            echo "Deployment not confirmed. Input must be exactly: DEPLOY"
            exit 1
          fi

      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Verify CNAME is present before deploying
        # public/CNAME must exist before production is switched over.
        # This step will fail fast if it was accidentally omitted.
        run: |
          if [ ! -f public/CNAME ]; then
            echo "ERROR: public/CNAME not found."
            echo "Add public/CNAME containing 'illustratedvault.com' before deploying."
            exit 1
          fi

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Supabase credentials are read from GitHub Actions secrets.
          # Set VITE_SUPA_URL and VITE_SUPA_KEY in the repo's Settings →
          # Secrets and variables → Actions before triggering this workflow.
          # They replace the hardcoded constants in index.legacy.html.
          VITE_SUPA_URL: ${{ secrets.VITE_SUPA_URL }}
          VITE_SUPA_KEY: ${{ secrets.VITE_SUPA_KEY }}

      - name: Deploy to GitHub Pages (gh-pages branch)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          # CNAME is copied from public/ into dist/ by Vite automatically.
          # Do not set cname here — let the file in public/CNAME handle it.
