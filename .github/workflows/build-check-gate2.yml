# ── Illustrated Vault — Gate 2 Build Check ────────────────────────────────────
#
# PURPOSE: Build-only smoke test. Checks out gate-2/vite-migration, installs
# dependencies, and runs `npm run build`. Nothing is deployed. The gh-pages
# branch is not touched. The live site is not affected.
#
# IMPORTANT: This file must live on the default branch (main) for GitHub to
# register the workflow_dispatch trigger and show it in the Actions UI.
# The checkout step targets gate-2/vite-migration, so the code under test
# is always from that branch regardless of where this file lives.
#
# Trigger: manual only (workflow_dispatch). No push, PR, or schedule triggers.
# ─────────────────────────────────────────────────────────────────────────────

name: Build Check — Gate 2

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build-check (default: gate-2/vite-migration)'
        required: false
        default: 'gate-2/vite-migration'

jobs:
  build-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch under test
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || 'gate-2/vite-migration' }}

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        # package-lock.json does not exist in this repo.
        # npm ci requires a lockfile — use npm install instead.
        run: npm install

      - name: Build
        # No VITE_ secrets are needed. src/services/supabaseClient.js uses
        # hardcoded publishable credentials. There are no import.meta.env
        # references anywhere in src/.
        run: npm run build

      - name: Confirm dist output exists
        run: |
          if [ ! -d dist ]; then
            echo "ERROR: dist/ was not produced. Build may have silently failed."
            exit 1
          fi
          echo "Build succeeded. dist/ contents:"
          ls dist/
